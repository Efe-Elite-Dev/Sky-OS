name: Sky-OS CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla (Checkout)
      uses: actions/checkout@v4

    - name: Gerekli Derleme Araçlarını Kur
      uses: actions/configure-pages@v5 # Altyapı araç istikrarı için tutuldu
      continue-on-error: true

    - name: Bağımlılıkları Yükle
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-multilib build-essential nasm xorriso grub-pc-bin grub-common mtools

    - name: Assembly Kodunu Derle (boot.asm)
      run: nasm -f elf32 boot.asm -o boot.o

    - name: Tüm Altsistemleri ve C Dosyalarını Derle
      run: |
        gcc -m32 -c kernel.c -o kernel.o -std=gnu99 -ffreestanding -Os -Wall -Wextra -fno-asynchronous-unwind-tables -fno-stack-protector
        gcc -m32 -c gui.c -o gui.o -std=gnu99 -ffreestanding -Os -Wall -Wextra -fno-asynchronous-unwind-tables -fno-stack-protector
        gcc -m32 -c screen.c -o screen.o -std=gnu99 -ffreestanding -Os -Wall -Wextra -fno-asynchronous-unwind-tables -fno-stack-protector
        gcc -m32 -c idt.c -o idt.o -std=gnu99 -ffreestanding -Os -Wall -Wextra -fno-asynchronous-unwind-tables -fno-stack-protector
        gcc -m32 -c keyboard.c -o keyboard.o -std=gnu99 -ffreestanding -Os -Wall -Wextra -fno-asynchronous-unwind-tables -fno-stack-protector
        gcc -m32 -c ai_subsystem.c -o ai_subsystem.o -std=gnu99 -ffreestanding -Os -Wall -Wextra -fno-asynchronous-unwind-tables -fno-stack-protector
        gcc -m32 -c deb_subsystem.c -o deb_subsystem.o -std=gnu99 -ffreestanding -Os -Wall -Wextra -fno-asynchronous-unwind-tables -fno-stack-protector
        gcc -m32 -c exe_subsystem.c -o exe_subsystem.o -std=gnu99 -ffreestanding -Os -Wall -Wextra -fno-asynchronous-unwind-tables -fno-stack-protector
        gcc -m32 -c sky_subsystem.c -o sky_subsystem.o -std=gnu99 -ffreestanding -Os -Wall -Wextra -fno-asynchronous-unwind-tables -fno-stack-protector

    - name: Tüm Obje Dosyalarını Kararlı Linkle (Linker)
      run: ld -m elf_i386 -T linker.ld boot.o kernel.o gui.o screen.o idt.o keyboard.o ai_subsystem.o deb_subsystem.o exe_subsystem.o sky_subsystem.o -o SkyOS.bin

    - name: ISO Klasör Yapısını ve Güvenli GRUB Konfigürasyonunu Hazırla
      run: |
        mkdir -p iso/boot/grub
        cp SkyOS.bin iso/boot/
        
        # Grafik kartını dikey çizgilerden kurtaracak mutlak GRUB komutları
        echo 'set default=0' > iso/boot/grub/grub.cfg
        echo 'set timeout=0' >> iso/boot/grub/grub.cfg
        echo 'menuentry "Sky-OS Modern OS" {' >> iso/boot/grub/grub.cfg
        echo '    set gfxmode=800x600x32' >> iso/boot/grub/grub.cfg
        echo '    set gfxpayload=keep' >> iso/boot/grub/grub.cfg
        echo '    multiboot /boot/SkyOS.bin' >> iso/boot/grub/grub.cfg
        echo '    boot' >> iso/boot/grub/grub.cfg
        echo '}' >> iso/boot/grub/grub.cfg

    - name: Temiz ve Garantili ISO Oluşturma
      run: grub-mkrescue -o SkyOS-OOBE-Mouse.iso iso

    - name: Derlenen ISO Dosyasını Yükle (Artifacts)
      uses: actions/upload-artifact@v4
      with:
        name: SkyOS-Windows-OOBE-ISO
        path: SkyOS-OOBE-Mouse.iso
