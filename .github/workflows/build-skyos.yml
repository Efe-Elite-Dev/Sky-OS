name: Sky-OS Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # ISO'nun boş çıkmasını engelleyen Linux araçları
    - name: Install ISO Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y xorriso syslinux syslinux-utils mtools

    - name: Restore Dependencies
      run: dotnet restore

    # HATA ÇÖZÜMÜ: Klasör fark etmeksizin .csproj dosyasını otomatik bulup derler
    - name: Build and Publish Sky-OS
      run: |
        PROJECT_FILE=$(find . -name "*.csproj" | head -n 1)
        echo "Bulunan Proje Dosyası: $PROJECT_FILE"
        dotnet publish "$PROJECT_FILE" -c Release -r cosmos

    # Gerçek .iso dosyasını VirtualBox için paketleyen kısım
    - name: Upload Sky-OS ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Sky-OS-Sanal-Disk
        path: "**/bin/Release/**/publish/*.iso"
        if-no-files-found: error
