name: Sky-OS Auto Build CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-os:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla (Checkout)
      uses: actions/checkout@v4

    - name: Gerekli Derleme Araçlarını Kur
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm gcc-multilib xorriso grub-pc-bin mtools

    - name: Dosyaları Güvenli Birleştir ve Derle
      run: |
        # 1. BOOT.ASM TEMİZLİĞİ
        # İlk satırdaki o hatalı/görünmez karakterli kısmı tamamen çöpe atıyoruz (1d)
        # Dosyadaki Windows satır sonlarını (\r) temizleyip yeni bir geçici dosyaya yazıyoruz
        sed '1d' boot.asm | tr -d '\r' > boot_temiz.asm

        # 2. KERNEL.C TEMİZLİĞİ (Hatanın Ana Kaynağı)
        # kernel.c içine sızan 'cat << EOF' (1. satır) ve 'EOF' (son satır) ifadelerini temizliyoruz
        # Sadece saf C kodunun kalmasını sağlıyoruz
        sed '1d;$d' kernel.c | tr -d '\r' > kernel_temiz.c

        echo "[+] Senin orijinal dosyaların RAM üzerinde temizlenip derleme başlatılıyor..."
        
        # Temizlenen kodları derliyoruz, depondaki orijinal dosyalara dokunmuyoruz
        nasm -f elf32 boot_temiz.asm -o boot.o
        gcc -m32 -c kernel_temiz.c -o kernel.o -std=gnu99 -ffreestanding -O2 -Wall -Wextra
        
        # Linker Script ile dosyaları nihai binary haline getiriyoruz
        ld -m elf_i386 -T linker.ld boot.o kernel.o -o mykernel.bin

    - name: ISO Klasör Yapısını ve GRUB Ayarlarını Kur
      run: |
        mkdir -p iso/boot/grub
        cp mykernel.bin iso/boot/
        
        cat << 'GRUB_EOF' > iso/boot/grub/grub.cfg
        set timeout=5
        set default=0
        menuentry "Sky-OS Saf AI Kernel" {
            multiboot /boot/mykernel.bin
            boot
        }
        GRUB_EOF

    - name: Boot Edilebilir ISO İmajını Üret
      run: |
        grub-mkisofs -o skyos.iso iso

    - name: ISO Dosyasını GitHub'a Yükle (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Sky-OS-Sanal-Disk
        path: skyos.iso
        retention-days: 7
