name: SKY OS CI Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-multilib g++-multilib binutils nasm xorriso grub-pc-bin mtools

    - name: Compile Assembly Files
      run: |
        if [ -f boot.asm ]; then nasm -f elf32 boot.asm -o boot.o; fi

    - name: Compile Kernel (kernel.c)
      run: |
        gcc -m32 -c kernel.c -o kernel.o -std=gnu99 -ffreestanding -O2 -Wall -Wextra -fno-exceptions -fno-stack-protector -fno-pie

    - name: Link Kernel
      run: |
        if [ -f linker.ld ]; then
          ld -m elf_i386 -T linker.ld -o kernel.bin boot.o kernel.o
        else
          ld -m elf_i386 -N -e kernel_main -Ttext 0x100000 -o kernel.bin kernel.o
        fi

    - name: Create ISO Structure
      run: |
        mkdir -p iso/boot/grub
        cp kernel.bin iso/boot/kernel.bin
        if [ ! -f iso/boot/grub/grub.cfg ]; then
          echo 'set timeout=0' > iso/boot/grub/grub.cfg
          echo 'set default=0' >> iso/boot/grub/grub.cfg
          echo 'menuentry "SKY OS" {' >> iso/boot/grub/grub.cfg
          echo '  multiboot /boot/kernel.bin' >> iso/boot/grub/grub.cfg
          echo '  boot' >> iso/boot/grub/grub.cfg
          echo '}' >> iso/boot/grub/grub.cfg
        fi

    - name: Build ISO Image
      run: |
        grub-mkrescue -o sky_os.iso iso

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sky-os-iso
        path: sky_os.iso
