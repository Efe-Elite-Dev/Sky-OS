name: Sky-OS Auto Build CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-os:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla (Checkout)
      uses: actions/checkout@v4

    - name: Gerekli Derleme Araçlarını Kur
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm gcc-multilib xorriso grub-pc-bin mtools

    - name: Görünmez Karakterleri Temizle ve Derle
      run: |
        # Senin boot.asm dosyandaki görünmez Windows karakterlerini (BOM ve CRLF) derleme öncesi geçici olarak temizler
        sed -i '1s/^\xEF\xBB\xBF//' boot.asm
        sed -i 's/\r$//' boot.asm

        echo "[+] Senin orijinal boot.asm dosyan derleniyor..."
        nasm -f elf32 boot.asm -o boot.o
        
        echo "[+] Senin orijinal kernel.c dosyan derleniyor..."
        gcc -m32 -c kernel.c -o kernel.o -std=gnu99 -ffreestanding -O2 -Wall -Wextra
        
        echo "[+] Senin orijinal linker.ld script'in ile birleştiriliyor..."
        ld -m elf_i386 -T linker.ld boot.o kernel.o -o mykernel.bin

    - name: ISO Klasör Yapısını ve GRUB Ayarlarını Kur
      run: |
        mkdir -p iso/boot/grub
        cp mykernel.bin iso/boot/
        
        # Sadece GRUB menüsünü oluşturur, senin kodlarına dokunmaz
        cat << 'GRUB_EOF' > iso/boot/grub/grub.cfg
        set timeout=5
        set default=0
        menuentry "Sky-OS Saf AI Kernel" {
            multiboot /boot/mykernel.bin
            boot
        }
        GRUB_EOF

    - name: Boot Edilebilir ISO İmajını Üret
      run: |
        grub-mkisofs -o skyos.iso iso

    - name: ISO Dosyasını GitHub'a Yükle (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Sky-OS-Sanal-Disk
        path: skyos.iso
        retention-days: 7
