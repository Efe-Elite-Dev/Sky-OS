name: Build Ultimate EXE-Executable Desktop Linux ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-ultimate-iso:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Run Advanced Archiso Builder
      run: |
        # Klasörleri kesin olarak oluştur ve herkese yazma izni ver
        mkdir -p ${{ github.workspace }}/iso-workspace ${{ github.workspace }}/output
        chmod -R 777 ${{ github.workspace }}

        docker run --privileged --rm \
          -v ${{ github.workspace }}:/workspace \
          archlinux:latest bash -c "
          # 1. SISTEM GUNCELLEME VE GEREKLI ARACLAR
          pacman -Syu --noconfirm
          pacman -S archiso git --noconfirm
          
          # Resmi profil şablonunu alıyoruz
          cp -r /usr/share/archiso/configs/releng /workspace/profile
          
          # 2. DEPASAA PAKET LISTESI (Masaüstü, Ses, Internet, Wine)
          cat <<EOF >> /workspace/profile/packages.x86_64
          xorg-server
          xorg-xinit
          xf86-video-intel
          xf86-video-amdgpu
          mesa
          lib32-mesa
          vulkan-intel
          vulkan-radeon
          nvidia-utils
          lib32-nvidia-utils
          xfce4
          xfce4-goodies
          lightdm
          lightdm-gtk-greeter
          networkmanager
          network-manager-applet
          wireless_tools
          wpa_supplicant
          dialog
          pipewire
          pipewire-alsa
          pipewire-pulse
          pipewire-jack
          wireplumber
          pavucontrol
          wine
          wine-gecko
          wine-mono
          winetricks
          zenity
          vkd3d
          lib32-vkd3d
          lib32-vulkan-intel
          lib32-vulkan-radeon
          thunar
          thunar-archive-plugin
          file-roller
          terminal
          nano
          firefox
          gparted
          EOF

          # 3. MULTILIB REPOSUNU AKTIF ETME (32-bit EXE Desteği İçin)
          sed -i '/\[multilib\]/,/Include = \/etc\/pacman.d\/mirrorlist/s/^#//' /workspace/profile/pacman.conf

          # 4. SISTEM AYARLARI VE SİHİRLİ CONFIGLER
          mkdir -p /workspace/profile/airootfs/etc/binfmt.d
          mkdir -p /workspace/profile/airootfs/etc/systemd/system/multi-user.target.wants

          # .EXE Çift Tıklama Sihri (binfmt_misc)
          echo ':DOSWin:M::MZ::/usr/bin/wine:' > /workspace/profile/airootfs/etc/binfmt.d/wine.conf

          # Ağ ve Giriş Ekranı Servislerini Otomatik Başlatma
          ln -sf /usr/lib/systemd/system/NetworkManager.service /workspace/profile/airootfs/etc/systemd/system/multi-user.target.wants/NetworkManager.service
          ln -sf /usr/lib/systemd/system/lightdm.service /workspace/profile/airootfs/etc/systemd/system/display-manager.service

          # 120Hz Ayarı
          mkdir -p /workspace/profile/airootfs/etc/X11/xorg.conf.d
          cat <<XORG > /workspace/profile/airootfs/etc/X11/xorg.conf.d/10-monitor.conf
          Section "Monitor"
              Identifier "Monitor0"
              Option "TargetRefresh" "120"
              Option "DPMS" "false"
          EndSection
          XORG

          # Otomatik Oturum Açma
          cat <<LIGHTDM > /workspace/profile/airootfs/etc/lightdm/lightdm.conf
          [Seat:*]
          autologin-user=root
          autologin-user-timeout=0
          user-session=xfce
          LIGHTDM

          # 5. ULTIMATE ISO DERLEME AŞAMASI
          # Çıktıyı doğrudan /workspace/output klasörüne zorluyoruz
          mkarchiso -v -w /workspace/iso-workspace -o /workspace/output /workspace/profile
          
          # Dosya izinlerini GitHub Actions okuyabilsin diye tekrar esnetiyoruz
          chmod -R 777 /workspace/output
        "

    - name: Upload Finished Ultimate ISO (Bul ve Yükle)
      uses: actions/upload-artifact@v4
      with:
        name: Ultimate-EXE-Linux-OS
        path: |
          **/*.iso
